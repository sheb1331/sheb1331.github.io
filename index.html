<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Kehadiran Praktikum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f1f3f5; padding-top: 50px; }
    .scanner-box { border: 2px dashed #0d6efd; border-radius: 12px; overflow: hidden; background: #000; }
    .card-auth { max-width: 400px; margin: 0 auto; border: none; }
  </style>
</head>
<body>

<div class="container">
  
  <div id="section-login">
    <div class="card shadow-lg card-auth rounded-3">
      <div class="card-body p-4">
        <h4 class="fw-bold text-center text-primary mb-3">LOGIN ASISTEN LAB</h4>
        <p class="text-muted text-center small mb-4">Silakan masukkan akun asisten Anda untuk mengaktifkan alat pemindai.</p>
        
        <input type="hidden" id="web-app-url" value="https://script.google.com/macros/s/AKfycbxplKEfDz4hWZMeZeLwsZrnqWjlHyzEo-tEbfvQxfNLT3o3CjmoIKivXuos-a8AhaS6bg/exec">

        <div class="mb-3">
          <label class="form-label small fw-bold">Email Asisten</label>
          <input type="email" id="inp-email" class="form-control" placeholder="nama@univ.ac.id">
        </div>
        <div class="mb-4">
          <label class="form-label small fw-bold">Password</label>
          <input type="password" id="inp-pass" class="form-control" placeholder="••••••••">
        </div>
        
        <button onclick="prosesLogin()" id="btn-login" class="btn btn-primary w-100 fw-bold py-2">Masuk Sistem</button>
        <div id="alert-login" class="alert alert-danger text-center d-none mt-3 small"></div>
      </div>
    </div>
  </div>

  <div id="section-scanner" class="d-none">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-3">
          <div class="card-body p-4 text-center">
            <div class="d-flex justify-content-between align-items-center mb-3">
              <span class="badge bg-success py-2 px-3">Active: <span id="txt-peran">Asisten</span></span>
              <button onclick="logout()" class="btn btn-outline-danger btn-sm">Keluar</button>
            </div>
            
            <h4 class="fw-bold text-dark m-0" id="txt-nama-admin">Nama Asisten</h4>
            <p class="text-muted small">Arahkan kamera ke QR Code mahasiswa</p>

            <div id="reader" class="scanner-box mx-auto" style="width: 100%; max-width: 350px; min-height: 250px;"></div>
            
            <div class="mt-3">
              <button id="btn-camera" onclick="initScanner()" class="btn btn-primary fw-bold px-4">Aktifkan Kamera</button>
            </div>

            <div class="mt-4 p-3 bg-light rounded border text-start">
              <h6 class="fw-bold text-secondary m-0">Log Hasil Terakhir:</h6>
              <div id="log-status" class="text-muted mt-2 fw-bold">Kamera Belum Aktif</div>
              <p id="log-detail" class="m-0 text-secondary small mt-1"></p>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  let html5QrcodeScanner;
  let loggedInEmail = "";

  function prosesLogin() {
    const email = document.getElementById('inp-email').value;
    const pass = document.getElementById('inp-pass').value;
    const webAppUrl = document.getElementById('web-app-url').value;
    const btn = document.getElementById('btn-login');
    const alertBox = document.getElementById('alert-login');

    if (!email || !pass) {
      alertBox.innerText = "Email dan password wajib diisi!";
      alertBox.classList.remove('d-none');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Memverifikasi...`;
    alertBox.classList.add('d-none');

    // Kirim data ke Google Sheets via Fetch API POST
    fetch(webAppUrl, {
      method: "POST",
      body: JSON.stringify({ action: "login", email: email, password: pass })
    })
    .then(res => res.json())
    .then(data => {
      btn.disabled = false;
      btn.innerText = "Masuk Sistem";

      if (data.success) {
        loggedInEmail = email;
        // Pindah Halaman ke Scanner
        document.getElementById('section-login').classList.add('d-none');
        document.getElementById('section-scanner').classList.remove('d-none');
        
        // Pasang Nama Admin yang didapat dari database Google Sheet
        document.getElementById('txt-nama-admin').innerText = data.nama;
        document.getElementById('txt-peran').innerText = data.peran;
      } else {
        alertBox.innerText = data.message;
        alertBox.classList.remove('d-none');
      }
    })
    .catch(err => {
      btn.disabled = false;
      btn.innerText = "Masuk Sistem";
      alertBox.innerText = "Gagal terhubung ke server. Pastikan URL Web App benar.";
      alertBox.classList.remove('d-none');
      console.error(err);
    });
  }

  function initScanner() {
    document.getElementById('log-status').innerText = "Meminta izin kamera...";
    document.getElementById('btn-camera').style.display = 'none';

    html5QrcodeScanner = new Html5Qrcode("reader");
    
    const qrCodeSuccessCallback = (decodedText, decodedResult) => {
      html5QrcodeScanner.pause(true);
      
      document.getElementById('log-status').innerHTML = `<span class="spinner-border spinner-border-sm text-primary"></span> Memproses NIM: ${decodedText}...`;
      document.getElementById('log-detail').innerText = "";

      const webAppUrl = document.getElementById('web-app-url').value;
      
      fetch(webAppUrl, {
        method: "POST",
        body: JSON.stringify({
          action: "scan",
          nim: decodedText,
          emailAdmin: loggedInEmail
        })
      })
      .then(res => res.json())
      .then(response => {
        if (response.success) {
          document.getElementById('log-status').innerHTML = `<span class="text-success">✔ BERHASIL MENCATAT</span>`;
          document.getElementById('log-detail').innerHTML = `<strong>Nama:</strong> ${response.nama}<br><strong>NIM:</strong> ${decodedText}<br><strong>Status:</strong> <span class="badge bg-success">${response.status}</span>`;
        } else {
          document.getElementById('log-status').innerHTML = `<span class="text-danger">❌ GAGAL</span>`;
          document.getElementById('log-detail').innerText = response.message;
        }
        
        setTimeout(() => {
          html5QrcodeScanner.resume();
          document.getElementById('log-status').innerText = "Siap scan barcode berikutnya...";
        }, 2500);
      })
      .catch(err => {
        document.getElementById('log-status').innerHTML = `<span class="text-danger">❌ ERROR JARINGAN</span>`;
        setTimeout(() => html5QrcodeScanner.resume(), 3000);
      });
    };

    const config = { fps: 10, qrbox: { width: 220, height: 220 } };

    html5QrcodeScanner.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
      .catch(err => {
        document.getElementById('log-status').innerText = "Gagal mengakses kamera: " + err;
        document.getElementById('btn-camera').style.display = 'inline-block';
      });
  }

  function logout() {
    if(html5QrcodeScanner) {
      html5QrcodeScanner.stop().catch(() => {});
    }
    location.reload();
  }
</script>
</body>
</html>
