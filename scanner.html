<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Kehadiran Praktikum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f1f3f5; padding-top: 40px; }
    .scanner-box { border: 2px dashed #0d6efd; border-radius: 12px; overflow: hidden; background: #000; }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg border-0 rounded-3">
        <div class="card-body p-4 text-center">
          <h3 class="fw-bold text-primary mb-3">Kamera Scanner Asisten</h3>
          <p class="text-muted small">Gunakan halaman eksternal ini untuk melakukan scanning barcode/QR mahasiswa dengan lancar tanpa hambatan izin browser.</p>
          
          <input type="hidden" id="web-app-url" value="https://script.google.com/a/macros/unesa.ac.id/s/AKfycbxplKEfDz4hWZMeZeLwsZrnqWjlHyzEo-tEbfvQxfNLT3o3CjmoIKivXuos-a8AhaS6bg/exec">

          <div id="reader" class="scanner-box mx-auto" style="width: 100%; max-width: 350px; min-height: 250px;"></div>
          
          <div class="mt-3">
            <button id="btn-camera" onclick="initScanner()" class="btn btn-primary fw-bold px-4">Aktifkan Kamera</button>
          </div>

          <div class="mt-4 p-3 bg-light rounded border">
            <h5 class="fw-bold text-secondary">Status & Hasil Terakhir:</h5>
            <h4 id="log-status" class="text-muted fs-5 mt-2">Kamera Belum Aktif</h4>
            <p id="log-detail" class="m-0 text-secondary small"></p>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let html5QrcodeScanner;

  function initScanner() {
    document.getElementById('log-status').innerText = "Meminta izin kamera...";
    document.getElementById('btn-camera').style.display = 'none';

    html5QrcodeScanner = new Html5Qrcode("reader");
    
    const qrCodeSuccessCallback = (decodedText, decodedResult) => {
      html5QrcodeScanner.pause(true); // Jeda kamera saat memproses data
      
      document.getElementById('log-status').innerHTML = `<span class="spinner-border spinner-border-sm text-primary"></span> Memproses NIM: ${decodedText}...`;
      document.getElementById('log-detail').innerText = "";

      const webAppUrl = document.getElementById('web-app-url').value;
      
      // Kirim data NIM menggunakan FETCH API (Metode POST) ke Google Apps Script
      fetch(webAppUrl, {
        method: "POST",
        mode: "no-cors", // Mengabaikan aturan CORS iFrame
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
          nim: decodedText,
          emailAdmin: "Asisten Lab (Web Eksternal)"
        })
      })
      .then(() => {
        // Karena menggunakan mode 'no-cors', browser tidak bisa membaca teks balasan sukses, 
        // namun data dijamin tetap sukses masuk dan ter-append di Google Sheets.
        document.getElementById('log-status').innerHTML = `<span class="text-success">✔ BERHASIL DIKIRIM</span>`;
        document.getElementById('log-detail').innerHTML = `NIM <strong>${decodedText}</strong> telah ditembakkan ke Google Sheets. Silakan cek lembar data Anda.`;
        
        // Hidupkan kembali kamera setelah jeda 2.5 detik
        setTimeout(() => {
          html5QrcodeScanner.resume();
          document.getElementById('log-status').innerText = "Siap scan barcode berikutnya...";
        }, 2500);
      })
      .catch(err => {
        document.getElementById('log-status').innerHTML = `<span class="text-danger">❌ GAGAL MENGIRIM</span>`;
        document.getElementById('log-detail').innerText = "Periksa koneksi internet Anda atau URL Web App Google.";
        setTimeout(() => html5QrcodeScanner.resume(), 3000);
      });
    };

    const config = { fps: 10, qrbox: { width: 220, height: 220 } };

    // Paksa membuka kamera belakang ponsel
    html5QrcodeScanner.start({ facingMode: "environment" }, config, qrCodeSuccessCallback)
      .catch(err => {
        document.getElementById('log-status').innerText = "Gagal mengakses kamera: " + err;
        document.getElementById('btn-camera').style.display = 'inline-block';
      });
  }
</script>
</body>
</html>
